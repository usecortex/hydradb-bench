benchmark:
  name: "HydraDB DeepEval Benchmark"

hydradb:
  base_url: "https://api.hydradb.com"
  tenant_id: "my-knowledge"
  sub_tenant_id: "legal-privacyqa"
  timeout_seconds: 30
  polling_interval_seconds: 10
  max_polling_attempts: 60
  create_tenant_on_start: false

ingestion:
  documents_dir: "./data/privacy_qa"
  file_extensions: [".txt", ".pdf", ".md", ".docx"]
  verify_before_querying: true
  upload_delay_seconds: 5
  upload_concurrency: 1         # files uploaded in parallel per batch

evaluation:
  test_dataset_path: "./data/privacy_qa.json"
  # Endpoint: "full_recall" | "recall_preferences" | "boolean_recall"
  search_endpoint: "full_recall"
  max_results: 10
  concurrent_requests: 3
  # Shared recall params
  mode: "thinking"          # "fast" | "thinking"
  alpha: 0.8            # hybrid weight: 0=BM25-only, 1=vector-only
  # full_recall / recall_preferences
  graph_context: true
  # recency_bias: 0.0
  # boolean_recall
  # boolean_operator: "or"         # "or" | "and" | "phrase"
  boolean_search_mode: "sources" # "sources" | "memories"

deepeval:
  model: "gpt-5.4"
  threshold: 0.5
  include_reason: true
  eval_concurrency: 5           # samples evaluated in parallel
  metric_timeout_seconds: 60    # per-metric timeout before marking as failed
  # Answer generation from retrieved context (used for all non-QnA endpoints)
  generator_model: "gpt-5.4"
  generator_temperature: 0.0
  generator_max_tokens: 1024
  metrics:
    - answer_accuracy
    - contextual_precision
    - contextual_recall
    - contextual_relevancy

reporting:
  output_dir: "./reports"
  formats: ["json", "html", "csv"]
  include_per_sample: true

# ── Supermemory (optional) ─────────────────────────────────────────────────
# Remove or comment out this entire section to disable Supermemory benchmarking.
# Set SUPERMEMORY_API_KEY in .env when this section is present.
supermemory:
  base_url: "https://api.supermemory.ai"
  container_tag: "legal-privacyqa"   # namespace — equivalent to HydraDB tenant
  timeout_seconds: 30
  # Ingestion
  verify_before_querying: true
  polling_interval_seconds: 5
  max_polling_attempts: 60
  reset_on_start: false               # set true to wipe container before ingestion
  # Search (POST /v3/search)
  search_mode: "hybrid"               # "hybrid" | "memories"
  rerank: true                       # true adds ~100ms latency but improves precision
  threshold: 0.0                      # minimum similarity score (0 = return everything)
  limit: 10                           # total chunks returned across all documents
                                      # limit=5 → only 1 doc's chunks; keep ≥20 for multi-doc spread
