benchmark:
  name: "HydraDB FinanceBench RAG Benchmark"
  run_id: null
  output_dir: "./reports/financebench"

hydradb:
  base_url: "${HYDRADB_BASE_URL}"
  timeout_seconds: 45
  polling_interval_seconds: 20   # fallback wait = 20s × 6 = 120s for async indexing
  max_polling_attempts: 60
  tenant_id: "${HYDRADB_TENANT_ID}"
  sub_tenant_id: "${HYDRADB_SUB_TENANT_ID}"
  create_tenant_on_start: true

ingestion:
  # Extract passages first (one-time step):
  #   python run_benchmark.py --extract-qa-corpus PatronusAI/financebench ./data/financebench_corpus --group-by doc_name
  documents_dir: "./data/financebench_corpus"
  file_extensions: [".txt"]
  verify_before_querying: true
  upload_delay_seconds: 0.5      # delay between uploads to avoid overwhelming the API

# ── HuggingFace: FinanceBench ─────────────────────────────────────────────────
# PatronusAI/financebench — 150 Q&A pairs grounded in real SEC filings
# Columns: question, answer, evidence (list of {evidence_text, ...}), financebench_id
#
hf_dataset:
  enabled: true
  mode: "qa"
  repo_id: "PatronusAI/financebench"
  split: "train"                   # only split available
  max_samples: 30                  # start small — increase to 150 for a full run
  column_map:
    reference_contexts: "evidence" # evidence field contains source passages
    id: "financebench_id"
  save_qa_path: "./data/financebench_samples.json"
  id_prefix: "fb"

testset_generation:
  enabled: false

# ── Evaluation ────────────────────────────────────────────────────────────────
evaluation:
  test_dataset_path: "./data/financebench_samples.json"
  search_endpoint: "qna"
  max_results: 5
  concurrent_requests: 2           # keep low to avoid rate-limits

  metrics:
    - faithfulness                 # Are answers grounded in retrieved docs?
    - response_relevancy           # Are answers relevant to the question?
    - context_precision            # Are retrieved chunks actually relevant?
    - context_recall               # Do retrieved chunks cover the ground truth?
    - factual_correctness          # Does the answer match the reference answer?

  # Finance-specific aspect critics
  aspect_critics:
    - name: "numerical_accuracy"
      definition: "Does the answer contain specific numerical values (amounts, percentages, ratios) that are accurate and precise? Generic or vague answers should score 0."
      strictness: 2
    - name: "source_grounding"
      definition: "Is the answer explicitly grounded in financial document evidence (e.g. cites line items, report names, fiscal periods)? Hallucinated or generic answers should score 0."
      strictness: 1
    - name: "financial_terminology"
      definition: "Does the answer use correct financial terminology and avoid misleading or incorrect financial concepts?"
      strictness: 1

  multi_turn:
    enabled: false

# ── RAGAS ─────────────────────────────────────────────────────────────────────
ragas:
  llm_provider: "openai"
  llm_model: "gpt-4o-mini"
  embeddings_provider: "openai"
  embeddings_model: "text-embedding-3-small"
  max_retries: 3
  timeout: 90
  max_workers: 2
  raise_exceptions: false

  cost_tracking:
    enabled: true
    cost_per_input_token: 0.00000015
    cost_per_output_token: 0.0000006

# ── Reporting ─────────────────────────────────────────────────────────────────
reporting:
  formats: ["json", "csv", "html"]
  include_per_sample_scores: true
