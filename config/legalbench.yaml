benchmark:
  name: "HydraDB LegalBench RAG Benchmark"
  run_id: null
  output_dir: "./reports/legalbench"

hydradb:
  base_url: "${HYDRADB_BASE_URL}"
  timeout_seconds: 45
  polling_interval_seconds: 20
  max_polling_attempts: 60
  tenant_id: "${HYDRADB_TENANT_ID}"
  sub_tenant_id: "legalbench-001"
  create_tenant_on_start: true

ingestion:
  # Corpus: 112 chapter-level .txt files from isaacus/legal-rag-bench (already merged)
  #   Passages grouped by chapter (X.Y), reducing 4,876 raw passages → 112 files
  documents_dir: "./data/legalbench_corpus"
  file_extensions: [".txt"]
  verify_before_querying: true
  upload_delay_seconds: 0.5

# ── HuggingFace: isaacus/legal-rag-bench ─────────────────────────────────────
# 100 Q&A pairs grounded in Australian jury instructions
# Columns: id, question, answer, relevant_passage_id
# Corpus: 4,876 passages with id, title, text, footnotes
#
hf_dataset:
  enabled: true
  mode: "qa"
  repo_id: "isaacus/legal-rag-bench"
  split: "test"
  config_name: "qa"               # HF dataset config — use the qa subset
  max_samples: 30                 # start small — increase to 100 for a full run
  column_map:
    id: "id"
  save_qa_path: "./data/legalbench_samples.json"
  id_prefix: "lb"

testset_generation:
  enabled: false

# ── Evaluation ────────────────────────────────────────────────────────────────
evaluation:
  test_dataset_path: "./data/legalbench_samples.json"
  search_endpoint: "qna"
  max_results: 5
  concurrent_requests: 2

  metrics:
    - faithfulness               # Are answers grounded in retrieved passages?
    - response_relevancy         # Are answers relevant to the legal question?
    - context_precision          # Are retrieved passages actually relevant?
    - factual_correctness        # Does the answer match the reference answer?
    # Note: context_recall requires reference_contexts per sample.
    # isaacus/legal-rag-bench links via relevant_passage_id (not inline text),
    # so context_recall is excluded here.

  # Legal-specific aspect critics
  aspect_critics:
    - name: "legal_accuracy"
      definition: "Does the answer correctly state the relevant legal rule, principle, or procedure? Incorrect or fabricated legal statements should score 0."
      strictness: 2
    - name: "citation_grounding"
      definition: "Is the answer grounded in the retrieved legal passages or cites specific legal provisions? Vague or unsupported answers should score 0."
      strictness: 1
    - name: "practical_guidance"
      definition: "Does the answer provide clear, actionable guidance that a judge or legal practitioner could apply? Overly abstract answers should score 0."
      strictness: 1

  multi_turn:
    enabled: false

# ── RAGAS ─────────────────────────────────────────────────────────────────────
ragas:
  llm_provider: "openai"
  llm_model: "gpt-4o-mini"
  embeddings_provider: "openai"
  embeddings_model: "text-embedding-3-small"
  max_retries: 3
  timeout: 90
  max_workers: 2
  raise_exceptions: false

  cost_tracking:
    enabled: true
    cost_per_input_token: 0.00000015
    cost_per_output_token: 0.0000006

# ── Reporting ─────────────────────────────────────────────────────────────────
reporting:
  formats: ["json", "csv", "html"]
  include_per_sample_scores: true
