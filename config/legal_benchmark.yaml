benchmark:
  name: "Legal Benchmark"
  run_id: null
  output_dir: "./reports"

# ── Per-dataset overrides ────────────────────────────────────────────────────
# Each entry gets its own sub-tenant, corpus, and Q&A samples.
# All other settings below are shared across all datasets.
datasets:
  - name: "ContractNLI"
    sub_tenant_id: "legal-contractnli"
    documents_dir: "./data/contractnli"
    test_dataset_path: "./data/legal_contractnli_samples.json"

  - name: "CUAD"
    sub_tenant_id: "legal-cuad"
    documents_dir: "./data/cuad"
    test_dataset_path: "./data/legal_cuad_samples.json"

  - name: "MAUD"
    sub_tenant_id: "legal-maud"
    documents_dir: "./data/maud"
    test_dataset_path: "./data/legal_maud_samples.json"

  - name: "PrivacyQA"
    sub_tenant_id: "legal-privacyqa"
    documents_dir: "./data/privacy_qa"
    test_dataset_path: "./data/legal_privacyqa_samples.json"

# ── Shared HydraDB connection ────────────────────────────────────────────────
hydradb:
  base_url: "${HYDRADB_BASE_URL}"
  timeout_seconds: 60
  polling_interval_seconds: 5
  max_polling_attempts: 60
  tenant_id: "${HYDRADB_TENANT_ID}"
  sub_tenant_id: ""             # overridden per dataset above
  create_tenant_on_start: true

# ── Shared ingestion settings ────────────────────────────────────────────────
ingestion:
  documents_dir: ""             # overridden per dataset above
  file_extensions: [".txt"]
  verify_before_querying: true
  upload_delay_seconds: 0.5


# ── Shared evaluation settings ───────────────────────────────────────────────
evaluation:
  test_dataset_path: ""         # overridden per dataset above
  search_endpoint: "full_recall"
  retrieve_mode: "thinking"           # "fast" | "thinking"
  max_results: 10
  concurrent_requests: 10
  metrics:
    - context_recall
    - context_relevance
  answer_generation:
    enabled: true
    provider: "openrouter"
    model: "openai/gpt-5.4"
    system_prompt: "You are a retrieval-grounded QA assistant. Answer the user's question"
    max_tokens: 1024
    temperature: 0.01

  aspect_critics:
    - name: "answer_accuracy"
      definition: "Is the answer accurate (only compare to groundtruth(reference) when groundtruth is relevant to question)?"
      strictness: 3

  scored_criteria:
    - name: "answer_relevancy"
      definition: >
        Score how directly the answer addresses the specific question asked.
        3 — The answer directly and specifically responds to what was asked.
        2 — The answer is mostly on-topic but includes some tangential content or minor hedging.
        1 — The answer is loosely related but doesn't really answer the question asked.
        0 — The answer is off-topic or completely ignores the question.
    

# ── RAGAS judge ──────────────────────────────────────────────────────────────
ragas:
  llm_provider: "openrouter"
  llm_model: "openai/gpt-5.4-mini"
  embeddings_provider: "openai"
  embeddings_model: "text-embedding-3-small"
  max_retries: 3
  timeout: 120
  max_workers: 2
  raise_exceptions: false
  temperature: 0.01
  judge_max_tokens: 8192
  cost_tracking:
    enabled: true

# ── Telegram notifications ────────────────────────────────────────────────────
telegram:
  enabled: true
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  # Send /start to your bot, then visit:
  # https://api.telegram.org/bot<your_token>/getUpdates  → look for "chat": {"id": ...}
  chat_id: "${TELEGRAM_CHAT_ID}"

# ── Reporting ────────────────────────────────────────────────────────────────
reporting:
  formats: ["json", "csv", "html"]
  include_per_sample_scores: true
