name: "Bug Report"
description: "Report a bug or unexpected behavior"
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: "A clear description of the bug"
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: "Steps to reproduce the behavior"
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: "What you expected to happen"
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: "What actually happened"
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: "Operating system"
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: "3.10"
    validations:
      required: true

  - type: textarea
    id: configuration
    attributes:
      label: Configuration
      description: "Relevant sections from your benchmark.yaml (redact API keys)"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: "Any relevant log output or error messages"
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
    validations:
      required: false
